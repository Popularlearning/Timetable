<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>課堂時間表生成器 (家長分享穩定版)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght=300;400;500;700&display=swap');
    body {
      font-family: 'Noto Sans TC', sans-serif;
    }
    .scrollbar-thin::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    .scrollbar-thin::-webkit-scrollbar-track {
      background: #f1f5f9;
    }
    .scrollbar-thin::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 3px;
    }
    [v-cloak] {
      display: none !important;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

  <div id="app" class="p-4 md:p-6 max-w-7xl mx-auto" v-cloak>
    
    <div v-if="isParentMode" class="mb-5 bg-gradient-to-r from-indigo-600 to-violet-700 text-white px-5 py-4 rounded-2xl flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3 shadow-md shadow-indigo-100 animate-fade-in">
      <div class="flex items-center gap-3">
        <div class="bg-white/20 p-2 rounded-xl">
          <i class="fa-solid fa-eye text-lg"></i>
        </div>
        <div>
          <span class="font-bold text-base block sm:inline">📢 家長唯讀分享模式</span>
          <p class="text-xs text-indigo-100 mt-0.5">此頁面為唯讀版本，所有編輯與管理功能已關閉。您可以點擊篩選不同的年級與切換平日/週末課表。</p>
        </div>
      </div>
      <button @click="exitParentMode" class="px-3.5 py-1.5 bg-white text-indigo-700 hover:bg-indigo-50 text-xs font-bold rounded-xl transition shadow-sm shrink-0">
        返回建立課表
      </button>
    </div>

    <header class="mb-6 flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4 bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
      <div>
        <div class="flex items-center gap-3">
          <div class="bg-indigo-600 text-white p-2.5 rounded-xl shadow-md shadow-indigo-100">
            <i class="fa-solid fa-calendar-days text-xl"></i>
          </div>
          <div>
            <h1 class="text-2xl font-bold text-slate-900">課堂時間表生成器</h1>
            <p class="text-sm text-slate-500 mt-0.5">專注於 <span class="font-semibold text-indigo-600">多年級對照 / 課程</span> 的極簡高效排課工具</p>
          </div>
        </div>
      </div>
      
      <div v-if="!isParentMode" class="flex flex-wrap items-center gap-3 w-full lg:w-auto">
        
        <button @click="generateShareLink" :disabled="isSavingShare" class="flex items-center justify-center gap-2 px-4 py-2.5 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 text-sm font-semibold rounded-xl transition shadow-sm w-full sm:w-auto border border-indigo-150">
          <i v-if="isSavingShare" class="fa-solid fa-spinner animate-spin"></i>
          <i v-else class="fa-solid fa-share-nodes text-indigo-600"></i>
          產生家長分享連結
        </button>

        <label class="flex items-center justify-center gap-2 px-4 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium rounded-xl cursor-pointer transition shadow-sm w-full sm:w-auto">
          <i class="fa-solid fa-file-import"></i>
          上傳 Timetable Setup.xlsx
          <input type="file" ref="fileInput" @change="handleFileUpload" accept=".xlsx, .xls, .csv" class="hidden">
        </label>
        
        <button @click="downloadTemplate" class="flex items-center justify-center gap-2 px-4 py-2.5 bg-white hover:bg-slate-50 text-slate-700 text-sm font-medium rounded-xl border border-slate-200 transition shadow-sm w-full sm:w-auto">
          <i class="fa-solid fa-file-arrow-down text-emerald-600"></i>
          下載 Excel 範本
        </button>

        <button @click="triggerResetConfirm" class="p-2.5 bg-slate-100 hover:bg-slate-200 text-slate-600 hover:text-slate-800 rounded-xl transition w-full sm:w-auto flex justify-center items-center" title="重置為預設資料">
          <i class="fa-solid fa-arrow-rotate-left mr-2 sm:mr-0"></i>
          <span class="sm:hidden text-sm font-medium">重置範例</span>
        </button>
      </div>
    </header>

    <div v-if="isLoading" class="flex flex-col items-center justify-center py-20 bg-white rounded-2xl border border-slate-100">
      <i class="fa-solid fa-spinner animate-spin text-4xl text-indigo-600 mb-4"></i>
      <p class="text-sm text-slate-500 font-semibold">正在從雲端載入課表數據...</p>
    </div>

    <div v-else class="grid grid-cols-1 lg:grid-cols-4 gap-6">
      
      <div class="lg:col-span-1 space-y-6">
        
        <div v-if="!isParentMode" class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 space-y-4">
          <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider">
            <i class="fa-solid fa-sliders mr-1"></i> 檢視設定
          </h2>
          
          <div class="flex items-center justify-between p-3 bg-slate-50 rounded-xl border border-slate-150">
            <div class="flex flex-col">
              <span class="text-xs font-bold text-slate-700">啟用編輯模式</span>
              <span class="text-[10px] text-slate-400">開啟後可自由增刪</span>
            </div>
            <button @click="isEditMode = !isEditMode" 
                    :class="isEditMode ? 'bg-indigo-600' : 'bg-slate-300'" 
                    class="relative inline-flex h-6 w-11 shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors duration-200 ease-in-out focus:outline-none">
              <span :class="isEditMode ? 'translate-x-5' : 'translate-x-0'" 
                    class="pointer-events-none inline-block h-5 w-5 transform rounded-full bg-white shadow ring-0 transition duration-200 ease-in-out"></span>
            </button>
          </div>
        </div>

        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
          <div class="flex justify-between items-center mb-4">
            <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider">
              <i class="fa-solid fa-filter mr-1"></i> 年級篩選
            </h2>
            <div class="flex gap-2">
              <button @click="selectAllGrades" class="text-xs text-indigo-600 hover:text-indigo-800 font-semibold">全選</button>
              <span class="text-slate-300">|</span>
              <button @click="deselectAllGrades" class="text-xs text-slate-500 hover:text-slate-800 font-semibold">清空</button>
            </div>
          </div>

          <div class="space-y-2.5 max-h-64 overflow-y-auto scrollbar-thin pr-1">
            <div v-for="grade in uniqueGrades" :key="grade" 
                 @click="toggleGradeSelection(grade)"
                 class="flex items-center gap-3 p-2.5 rounded-xl border cursor-pointer transition-all duration-1
